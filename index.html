<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malkoçoğlu Mobilya - Estetik Reels Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: #1a1a1a;
        }

        .phone-mockup {
            width: 310px;
            height: 620px;
            border: 10px solid #111;
            border-radius: 45px;
            overflow: hidden;
            position: relative;
            background: #000;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        /* Sahne Yönetimi - Görünürlük Sorunu Çözüldü */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            display: none;
            /* Başlangıçta kapalı */
            transition: opacity 1s ease-in-out;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 10;
        }

        .scene.active {
            opacity: 1;
            display: flex;
            /* Aktifken görünür */
            z-index: 20;
        }

        /* Arka Plan Efektleri */
        .image-bg-blur {
            position: absolute;
            inset: -10%;
            background-size: cover;
            background-position: center;
            filter: blur(30px) brightness(0.4);
            z-index: 1;
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0, 0, 0, 0.5) 100%);
            z-index: 15;
            pointer-events: none;
        }

        .image-container {
            width: 100%;
            height: 100%;
            background-size: contain;
            /* Tam Fotoğraf İçin */
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
            z-index: 2;
        }

        /* Yavaş ve Yumuşak Zoom */
        .zoom-animation {
            animation: slowZoom 25s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.08);
            }
        }

        /* Tipografi */
        .text-overlay {
            position: absolute;
            bottom: 110px;
            left: 20px;
            right: 20px;
            color: white;
            z-index: 30;
            text-align: center;
        }

        .text-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            transform: translateY(20px);
            opacity: 0;
            transition: all 1s ease-out;
        }

        .text-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 9px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.7);
            transform: translateY(15px);
            opacity: 0;
            transition: all 1s ease-out 0.3s;
        }

        .scene.active .text-title,
        .scene.active .text-subtitle {
            opacity: 1;
            transform: translateY(0);
        }

        /* Progress Bar */
        .progress-bar-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            height: 2px;
            z-index: 50;
            display: flex;
            gap: 5px;
        }

        .progress-segment {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: white;
            width: 0%;
        }

        /* UI Kontrolleri */
        .suggestion-chip {
            font-size: 9px;
            padding: 5px 12px;
            background: #fff;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #eee;
            color: #666;
            font-weight: 600;
        }

        .suggestion-chip:hover {
            border-color: #000;
            color: #000;
            background: #f8fafc;
        }

        .music-chip {
            width: 100%;
            font-size: 10px;
            font-weight: 700;
            padding: 12px;
            background: #fff;
            border-radius: 16px;
            cursor: pointer;
            border: 1px solid #eee;
            color: #999;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .music-chip.active {
            background: #000;
            color: #fff;
            border-color: #000;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .logo-box {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">

    <div class="flex flex-col lg:flex-row items-start gap-12 max-w-7xl w-full">

        <!-- Sol Panel -->
        <div class="flex-1 space-y-8 w-full lg:max-w-xl">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center shadow-2xl">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">Malkoçoğlu <span
                                class="font-light italic text-slate-400">Studio</span></h1>
                        <p
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center lg:text-left">
                            Huzurlu Tasarım Editörü</p>
                    </div>
                </div>
                <button id="clear-btn"
                    class="text-[10px] font-bold text-red-500 hover:opacity-70 transition-opacity uppercase tracking-tighter">Sıfırla</button>
            </div>

            <!-- Ayarlar -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Audio Mood</p>
                    <div class="space-y-2">
                        <button class="music-chip active"
                            onclick="setMusicPrompt('Ultra slow zen mood, peaceful piano', this)">🧘 Huzurlu
                            Zen</button>
                        <button class="music-chip" onclick="setMusicPrompt('Luxury architecture piano melody', this)">🎹
                            Sakin Piyano</button>
                    </div>
                    <button id="generate-music-btn"
                        class="w-full bg-slate-50 text-black border border-slate-200 py-3 rounded-xl text-[10px] font-bold uppercase hover:bg-slate-100 transition-all">AI
                        Müzik Hazırla</button>
                </div>

                <div
                    class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col justify-center items-center">
                    <div id="drop-zone"
                        class="w-full border-2 border-dashed border-slate-100 rounded-[2rem] py-8 cursor-pointer hover:bg-slate-50 transition-all text-center">
                        <span class="text-2xl block mb-2">📸</span>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Görsel Yükle</p>
                        <input type="file" id="file-input" multiple accept="image/*" class="hidden">
                    </div>
                </div>
            </div>

            <!-- Sahneler Listesi -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Timeline</p>
                    <span id="total-time-display"
                        class="text-xs font-bold text-black bg-slate-100 px-3 py-1 rounded-full">0.0s</span>
                </div>
                <div id="steps-container" class="space-y-4 max-h-[300px] overflow-y-auto no-scrollbar pr-2"></div>

                <button id="play-btn"
                    class="w-full bg-black text-white py-5 rounded-2xl font-black hover:opacity-90 transition-all shadow-xl disabled:opacity-20 uppercase text-xs tracking-widest">
                    Önizlemeyi Başlat
                </button>
            </div>
        </div>

        <!-- Sağ Panel: Telefon -->
        <div class="phone-mockup">
            <div id="progress-container" class="progress-bar-container"></div>
            <div id="scenes-container" class="w-full h-full relative bg-black">
                <!-- Outro Sabit Kalacak -->
                <div id="scene-outro" class="scene bg-black flex-col text-center px-8">
                    <div class="logo-reveal flex flex-col items-center">
                        <div class="logo-box"><span class="text-4xl font-black text-black">M</span></div>
                        <h2 class="text-white text-xl font-bold tracking-[0.2em] uppercase">Malkoçoğlu</h2>
                        <p class="text-slate-500 text-[8px] tracking-[0.5em] font-bold mt-2 uppercase">Mobilya Tasarım
                        </p>
                        <div class="h-[1px] w-10 bg-slate-800 my-8"></div>
                        <p class="text-white text-[10px] opacity-50 font-light italic tracking-tight leading-relaxed">
                            1984'ten beri estetiğin en rafine hali.</p>
                    </div>
                </div>
            </div>

            <!-- Kullanıcı Bilgisi -->
            <div class="absolute bottom-10 left-6 z-40 flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-full bg-white flex items-center justify-center font-black text-black text-[10px]">
                    M</div>
                <div class="text-white">
                    <p class="text-[10px] font-bold tracking-tight shadow-sm">malkocoglu_mobilya</p>
                    <p class="text-[8px] opacity-70 flex items-center gap-1">🌙 <span id="playing-music-name">Henüz
                            Seçilmedi</span></p>
                </div>
            </div>
        </div>

    </div>

    <audio id="bg-audio" loop preload="auto"></audio>

    <script>
        const apiKey = "";
        let uploadedImages = [];
        let isPlaying = false;
        let currentSceneIndex = 0;
        let playInterval;
        let sceneTimeout;
        let startTime;

        const SCENE_DURATION = 5.0;
        const OUTRO_DURATION = 4.0;

        const smartMatchCatalog = {
            bathroom: { initial: "Banyonuzda Modern Klasik", sub: "Estetiğin Islak Alanlardaki İmzası", options: ["Banyoda Siyahın Zarafeti", "Minimalist ve Ferah Alanlar", "Modern Estetik Gücü"] },
            vestiyer: { initial: "Kusursuz Bir Karşılama", sub: "Fonksiyonel ve Şık Vestiyerler", options: ["Giriş Alanında Düzen", "Evinizin İlk İzlenimi", "Zarif Depolama"] },
            cafe: { initial: "Germia Coffee: Mekan Ruhu", sub: "Ticari Tasarımda Mimari Ustalık", options: ["Mekana Estetik Dokunuş", "İşlevsel Mimari", "Tasarımla Gelen Keyif"] },
            default: { initial: "Malkoçoğlu Tasarım", sub: "Yaşam Alanına Değer Katın", options: ["Modern Dokunuşlar", "Estetik ve Fonksiyon", "Rafine Detaylar"] }
        };

        window.setMusicPrompt = (prompt, btn) => {
            document.querySelectorAll('.music-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
        };

        async function generateAiMusic() {
            const label = document.getElementById('playing-music-name');
            const btn = document.getElementById('generate-music-btn');
            btn.innerText = "YÜKLENİYOR..."; btn.disabled = true;

            try {
                const activeChip = document.querySelector('.music-chip.active');
                const isPiano = activeChip && activeChip.innerText.includes('Piyano');
                const url = isPiano ? "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" : "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3";

                const audio = document.getElementById('bg-audio');
                audio.src = url;
                audio.load();
                label.innerText = isPiano ? "Sakin Piyano" : "Huzurlu Zen";
                btn.innerText = "✓ HAZIR";
                setTimeout(() => { btn.innerText = "AI MELODİ HAZIRLA"; btn.disabled = false; }, 1500);
            } catch (e) {
                btn.innerText = "AI MELODİ HAZIRLA"; btn.disabled = false;
            }
        }

        document.getElementById('generate-music-btn').addEventListener('click', generateAiMusic);

        const handleFiles = (files) => {
            if (isPlaying) stopPlayback();
            Array.from(files).forEach((file) => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        let type = 'default';
                        const name = file.name.toLowerCase();
                        if (name.includes('9543') || name.includes('bath')) type = 'bathroom';
                        else if (name.includes('9288') || name.includes('vesti')) type = 'vestiyer';
                        else if (name.includes('4014') || name.includes('coffee')) type = 'cafe';

                        const data = smartMatchCatalog[type];
                        uploadedImages.push({
                            url: e.target.result,
                            title: data.initial,
                            sub: data.sub,
                            options: data.options
                        });
                        renderApp();
                    };
                    reader.readAsDataURL(file);
                }
            });
        };

        function renderApp() {
            const steps = document.getElementById('steps-container');
            const scenes = document.getElementById('scenes-container');
            const progress = document.getElementById('progress-container');

            steps.innerHTML = '';
            // Outro'yu koruyarak diğer sahneleri temizle
            const outro = document.getElementById('scene-outro');
            scenes.innerHTML = '';
            scenes.appendChild(outro);
            progress.innerHTML = '';

            if (uploadedImages.length === 0) {
                document.getElementById('play-btn').disabled = true;
                return;
            }

            document.getElementById('play-btn').disabled = false;
            const totalTime = (uploadedImages.length * SCENE_DURATION) + OUTRO_DURATION;
            document.getElementById('total-time-display').innerText = totalTime.toFixed(1) + "s";

            uploadedImages.forEach((img, idx) => {
                // Timeline
                const step = document.createElement('div');
                step.className = `p-4 rounded-[1.5rem] bg-slate-50 border border-slate-100 flex flex-col gap-3 transition-all`;
                step.id = `step-${idx}`;
                let optionsHtml = img.options.map(opt => `<span class="suggestion-chip" onclick="updateText(${idx}, '${opt}')">${opt}</span>`).join('');
                step.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${img.url}" class="w-10 h-10 rounded-xl object-cover border-2 border-white shadow-sm">
                        <input type="text" id="input-${idx}" value="${img.title}" oninput="updateText(${idx}, this.value)" class="flex-1 text-xs font-bold bg-transparent focus:outline-none">
                        <button onclick="uploadedImages.splice(${idx},1);renderApp();" class="text-red-400 text-xs">✕</button>
                    </div>
                    <div class="flex flex-wrap gap-2">${optionsHtml}</div>
                `;
                steps.appendChild(step);

                // Sahne
                const scene = document.createElement('div');
                scene.id = `scene-${idx}`;
                scene.className = `scene`;
                scene.innerHTML = `
                    <div class="image-bg-blur" style="background-image: url('${img.url}')"></div>
                    <div class="vignette"></div>
                    <div class="image-container zoom-animation" style="background-image: url('${img.url}');"></div>
                    <div class="text-overlay">
                        <div class="text-title">${img.title}</div>
                        <div class="text-subtitle">${img.sub}</div>
                    </div>
                `;
                scenes.insertBefore(scene, outro);

                // Progress
                const seg = document.createElement('div');
                seg.className = 'progress-segment';
                seg.innerHTML = `<div id="fill-${idx}" class="progress-fill"></div>`;
                progress.appendChild(seg);
            });

            const outroSeg = document.createElement('div');
            outroSeg.className = 'progress-segment';
            outroSeg.innerHTML = `<div id="fill-outro" class="progress-fill"></div>`;
            progress.appendChild(outroSeg);

            // Başlangıçta ilk sahneyi göster
            document.querySelectorAll('.scene').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
            const firstScene = document.getElementById('scene-0');
            if (firstScene) {
                firstScene.classList.add('active');
                firstScene.style.display = 'flex';
            }
        }

        window.updateText = (idx, val) => {
            if (!uploadedImages[idx]) return;
            uploadedImages[idx].title = val;
            const input = document.getElementById(`input-${idx}`);
            if (input) input.value = val;
            const titleEl = document.querySelector(`#scene-${idx} .text-title`);
            if (titleEl) titleEl.innerText = val;
        };

        function startPlayback() {
            if (isPlaying || uploadedImages.length === 0) return;
            isPlaying = true; currentSceneIndex = 0;
            document.getElementById('play-btn').innerText = "⏹ DURDUR";

            const audio = document.getElementById('bg-audio');
            if (audio.src) { audio.currentTime = 0; audio.play().catch(e => { }); }

            startTime = Date.now();
            runProgress();
            updatePlayback();
        }

        function stopPlayback() {
            isPlaying = false;
            clearTimeout(sceneTimeout);
            clearInterval(playInterval);
            document.getElementById('play-btn').innerText = "ÖNİZLEMEYİ BAŞLAT";

            const audio = document.getElementById('bg-audio');
            audio.pause();

            document.querySelectorAll('.scene').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
            document.querySelectorAll('.progress-fill').forEach(f => f.style.width = '0%');
            document.querySelectorAll('[id^="step-"]').forEach(s => s.classList.remove('ring-4', 'ring-slate-900/10', 'bg-white shadow-xl'));

            const first = document.getElementById('scene-0');
            if (first) { first.classList.add('active'); first.style.display = 'flex'; }
        }

        function updatePlayback() {
            if (!isPlaying) return;

            document.querySelectorAll('.scene').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
            document.querySelectorAll('[id^="step-"]').forEach(s => s.classList.remove('ring-4', 'ring-slate-900/10', 'bg-white shadow-xl'));

            if (currentSceneIndex < uploadedImages.length) {
                const s = document.getElementById(`scene-${currentSceneIndex}`);
                if (s) { s.classList.add('active'); s.style.display = 'flex'; }

                const st = document.getElementById(`step-${currentSceneIndex}`);
                if (st) {
                    st.classList.add('ring-4', 'ring-slate-900/10', 'bg-white', 'shadow-xl');
                    st.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }

                sceneTimeout = setTimeout(() => {
                    currentSceneIndex++;
                    updatePlayback();
                }, SCENE_DURATION * 1000);
            } else {
                const outro = document.getElementById('scene-outro');
                if (outro) { outro.classList.add('active'); outro.style.display = 'flex'; }
                sceneTimeout = setTimeout(() => stopPlayback(), OUTRO_DURATION * 1000);
            }
        }

        function runProgress() {
            playInterval = setInterval(() => {
                if (!isPlaying) return;
                const elapsed = (Date.now() - startTime) / 1000;
                let acc = 0;
                uploadedImages.forEach((img, idx) => {
                    const fill = document.getElementById(`fill-${idx}`);
                    if (!fill) return;
                    const end = acc + SCENE_DURATION;
                    if (elapsed > end) fill.style.width = '100%';
                    else if (elapsed > acc) fill.style.width = ((elapsed - acc) / SCENE_DURATION) * 100 + '%';
                    else fill.style.width = '0%';
                    acc = end;
                });
                const outroFill = document.getElementById('fill-outro');
                if (outroFill) {
                    const start = acc, end = acc + OUTRO_DURATION;
                    if (elapsed > end) outroFill.style.width = '100%';
                    else if (elapsed > start) outroFill.style.width = ((elapsed - start) / OUTRO_DURATION) * 100 + '%';
                    else outroFill.style.width = '0%';
                }
            }, 16);
        }

        document.getElementById('play-btn').addEventListener('click', () => isPlaying ? stopPlayback() : startPlayback());
        document.getElementById('drop-zone').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => handleFiles(e.target.files));
        document.getElementById('clear-btn').addEventListener('click', () => { uploadedImages = []; renderApp(); stopPlayback(); });

    </script>
</body>

</html>
