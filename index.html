<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malkoçoğlu Mobilya - Estetik Reels Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: #1a1a1a;
        }

        /* Akordiyon Oklarını Gizle */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }

        .phone-mockup {
            width: 310px;
            height: 620px;
            border: 10px solid #111;
            border-radius: 45px;
            overflow: hidden;
            position: relative;
            background: #000;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        .scene {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; display: none;
            transition: opacity 1s ease-in-out;
            align-items: center; justify-content: center;
            overflow: hidden; z-index: 10;
        }
        .scene.active { opacity: 1; display: flex; z-index: 20; }

        .image-bg-blur {
            position: absolute; inset: -10%; background-size: cover; background-position: center; filter: blur(30px) brightness(0.4); z-index: 1;
        }
        .vignette {
            position: absolute; inset: 0; background: radial-gradient(circle, transparent 20%, rgba(0, 0, 0, 0.5) 100%); z-index: 15; pointer-events: none;
        }
        .image-container {
            width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; position: relative; z-index: 2;
        }

        .zoom-animation { animation: slowZoom 25s infinite alternate ease-in-out; }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.08); } }

        .text-overlay {
            position: absolute; bottom: 110px; left: 20px; right: 20px; color: white; z-index: 30; text-align: center;
        }
        .text-title {
            font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; line-height: 1.2; text-shadow: 0 10px 30px rgba(0,0,0,0.8); transform: translateY(20px); opacity: 0; transition: all 1s ease-out;
        }
        .text-subtitle {
            font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 400; text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; color: rgba(255,255,255,0.7); transform: translateY(15px); opacity: 0; transition: all 1s ease-out 0.3s;
        }
        .scene.active .text-title, .scene.active .text-subtitle { opacity: 1; transform: translateY(0); }

        .progress-bar-container {
            position: absolute; top: 15px; left: 15px; right: 15px; height: 2px; z-index: 50; display: flex; gap: 5px;
        }
        .progress-segment {
            flex: 1; height: 100%; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden;
        }
        .progress-fill { height: 100%; background: white; width: 0%; }

        .suggestion-chip {
            font-size: 9px; padding: 5px 12px; background: #fff; border-radius: 20px; cursor: pointer; transition: all 0.2s; border: 1px solid #eee; color: #666; font-weight: 600;
        }
        .suggestion-chip:hover { border-color: #000; color: #000; background: #f8fafc; }

        .music-chip {
            width: 100%; font-size: 10px; font-weight: 700; padding: 12px; background: #fff; border-radius: 16px; cursor: pointer; border: 1px solid #eee; color: #999; transition: all 0.3s; text-transform: uppercase; display: block; text-align: center;
        }
        .music-chip.active { background: #000; color: #fff; border-color: #000; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .logo-box {
            width: 70px; height: 70px; background: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* Sidebar Geçiş Efekti (Sidebar'ın ana ekrandan ayrılması için gölge) */
        #sidebar { box-shadow: 10px 0 30px rgba(0,0,0,0.05); }

    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-800 font-sans">

    <!-- Mobil Arka Plan (Sidebar Açıkken Ortaya Çıkar) -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black/60 z-40 hidden transition-opacity opacity-0 md:hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <!-- Menü Toggle Butonu -->
    <button id="sidebar-toggle" onclick="toggleSidebar()" class="fixed top-5 left-5 z-50 bg-black text-white p-3 rounded-full shadow-2xl hover:bg-slate-800 hover:scale-105 transition-all flex items-center justify-center">
        <svg id="toggle-icon-bars" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        <svg id="toggle-icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>

    <!-- Sidebar Akordiyon Menü -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-[85%] sm:w-[380px] bg-white border-r border-slate-100 flex flex-col transform -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.19,1,0.22,1)] will-change-transform">
        
        <!-- Sidebar Başlık Alanı -->
        <div class="h-24 pt-8 pb-4 px-6 border-b border-slate-50 flex items-center justify-between pl-20 shrink-0">
            <div>
                <h2 class="text-xl font-bold tracking-tight">Studio UI</h2>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Gelişmiş Ayarlar</p>
            </div>
        </div>

        <!-- Akordiyon Sekmeler -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32">
            
            <!-- 1. Marka ve Tasarım (Akordiyon) -->
            <details class="group bg-slate-50 rounded-[1.5rem] border border-slate-100 shadow-sm" open>
                <summary class="flex items-center justify-between p-5 cursor-pointer font-bold text-[10px] uppercase tracking-[0.2em] text-slate-500 group-open:text-black transition-colors select-none">
                    Marka & Kimlik Sentezi
                    <span class="transform transition-transform duration-300 group-open:rotate-180 bg-white rounded-full p-1 shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </span>
                </summary>
                <div class="p-5 pt-0 border-t border-slate-100/50 mt-2">
                    <div class="flex flex-col items-start gap-4 mt-4">
                        <div class="relative group cursor-pointer" onclick="document.getElementById('logo-upload').click()" title="Logoyu Değiştir">
                            <div id="main-logo-container" class="w-14 h-14 bg-black rounded-[1.2rem] flex items-center justify-center shadow-lg overflow-hidden bg-cover bg-center transition-transform group-hover:scale-105 border-4 border-white">
                                <svg id="default-logo-svg" class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                            </div>
                            <div class="absolute inset-0 bg-black/40 rounded-[1.2rem] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="text-[8px] text-white font-bold uppercase tracking-wider">Değiştir</span>
                            </div>
                            <input type="file" id="logo-upload" accept="image/*" class="hidden" onchange="changeLogo(event)">
                        </div>
                        <div class="w-full">
                            <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                <label class="text-[8px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Marka Adı</label>
                                <div id="brand-name-edit" contenteditable="true" class="text-sm font-bold tracking-tight outline-none cursor-text w-full" spellcheck="false" oninput="updateBrand(this.innerText)">Malkoçoğlu</div>
                            </div>
                            <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-sm mt-3">
                                <label class="text-[8px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Alt Başlık (Sub)</label>
                                <div id="brand-sub-edit" contenteditable="true" class="text-sm font-light italic text-slate-600 outline-none cursor-text w-full" spellcheck="false" oninput="updateStudioText(this.innerText)">Studio</div>
                            </div>
                            <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-sm mt-3">
                                <label class="text-[8px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Slogan (Bitiş İçin)</label>
                                <div id="brand-slogan-edit" contenteditable="true" spellcheck="false" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest outline-none cursor-text w-full" oninput="updateSlogan(this.innerText)">Huzurlu Tasarım Editörü</div>
                            </div>
                        </div>
                    </div>
                </div>
            </details>

            <!-- 2. Müzik & Mood (Akordiyon) -->
            <details class="group bg-slate-50 rounded-[1.5rem] border border-slate-100 shadow-sm">
                <summary class="flex items-center justify-between p-5 cursor-pointer font-bold text-[10px] uppercase tracking-[0.2em] text-slate-500 group-open:text-black transition-colors select-none">
                    Müzik & Mood Seçimi
                    <span class="transform transition-transform duration-300 group-open:rotate-180 bg-white rounded-full p-1 shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </span>
                </summary>
                <div class="p-5 pt-0 border-t border-slate-100/50 mt-2 space-y-3">
                    <button class="music-chip active" onclick="setMusicPrompt('Ultra slow zen mood, peaceful piano', this)">🧘 Huzurlu Zen Mood</button>
                    <button class="music-chip" onclick="setMusicPrompt('Luxury architecture piano melody', this)">🎹 Sakin Piyano</button>
                    <button id="generate-music-btn" class="w-full bg-slate-900 text-white py-3 rounded-[1rem] text-[10px] font-bold uppercase hover:bg-slate-800 transition-all shadow-lg mt-4">AI Müziği Yükle</button>
                </div>
            </details>

            <!-- 3. İçerik ve Görsel (Akordiyon) -->
            <details class="group bg-slate-50 rounded-[1.5rem] border border-slate-100 shadow-sm" open>
                <summary class="flex items-center justify-between p-5 cursor-pointer font-bold text-[10px] uppercase tracking-[0.2em] text-slate-500 group-open:text-black transition-colors select-none">
                    Sahneler (Medya)
                    <span class="transform transition-transform duration-300 group-open:rotate-180 bg-white rounded-full p-1 shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </span>
                </summary>
                <div class="p-5 pt-0 border-t border-slate-100/50 mt-2">
                    <div id="drop-zone" class="w-full bg-white border-2 border-dashed border-slate-200 rounded-[1.5rem] py-8 cursor-pointer hover:bg-blue-50 hover:border-blue-300 transition-all text-center shadow-sm">
                        <span class="text-3xl block mb-3 opacity-80">📸</span>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Görsel Ekle</p>
                        <input type="file" id="file-input" multiple accept="image/*" class="hidden">
                    </div>
                </div>
            </details>

            <!-- 4. Timeline ve Akış (Akordiyon) -->
            <details class="group bg-slate-50 rounded-[1.5rem] border border-slate-100 shadow-sm" open>
                <summary class="flex items-center justify-between p-5 cursor-pointer font-bold text-[10px] uppercase tracking-[0.2em] text-slate-500 group-open:text-black transition-colors select-none">
                    Timeline Akışı 
                    <div class="flex items-center gap-2">
                        <span id="total-time-display" class="font-black text-[12px] bg-slate-200 px-3 py-1 rounded-full text-black">0.0s</span>
                        <span class="transform transition-transform duration-300 group-open:rotate-180 bg-white rounded-full p-1 shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </span>
                    </div>
                </summary>
                <div class="p-4 pt-0 border-t border-slate-100/50 mt-2">
                    <div id="steps-container" class="space-y-4 max-h-[300px] overflow-y-auto no-scrollbar pr-2 mt-2">
                        <!-- Sahneler JS ile dolacak -->
                        <div class="text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest py-8">Henüz Sahne Yok</div>
                    </div>
                </div>
            </details>

        </div>

        <!-- Sidebar Footer Action (Sabit) -->
        <div class="absolute bottom-0 left-0 w-full p-5 bg-white border-t border-slate-100 shadow-[0_-10px_30px_rgba(0,0,0,0.02)]">
            <button id="play-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black hover:bg-blue-700 hover:scale-[1.02] transform transition-all shadow-2xl disabled:opacity-20 uppercase text-[10px] tracking-widest flex items-center justify-center gap-2" disabled>
                <span id="btn-icon">▶</span> <span id="btn-text">ÖNİZLEMEYİ BAŞLAT</span>
            </button>
            <div class="flex justify-center mt-3">
                <button id="clear-btn" class="text-[9px] font-bold text-slate-400 hover:text-red-500 transition-colors uppercase tracking-widest">Tümünü Sıfırla</button>
            </div>
        </div>
    </aside>

    <!-- Ana Çerçeve (Telefon Konumu) -->
    <main class="flex-1 w-full relative h-screen flex items-center justify-center pt-20 pb-12 px-4 transition-all duration-500">
        
        <!-- Telefon İçin Resizer / Wrapper -->
        <div id="mockup-wrapper" class="relative transition-transform duration-300 origin-center filter drop-shadow-[0_45px_100px_rgba(0,0,0,0.25)] flex items-center justify-center pointer-events-none">
            
            <!-- Sağ Panel: Telefon -->
            <div class="phone-mockup pointer-events-auto">
                <div id="progress-container" class="progress-bar-container"></div>
                <div id="scenes-container" class="w-full h-full relative bg-black">
                    <!-- Outro Sabit Kalacak -->
                    <div id="scene-outro" class="scene bg-black flex-col text-center px-8">
                        <div class="logo-reveal flex flex-col items-center">
                            <div id="outro-logo-box" class="logo-box"><span id="outro-logo-letter" class="text-4xl font-black text-black">M</span></div>
                            <h2 id="outro-brand-title" class="text-white text-xl font-bold tracking-[0.2em] uppercase text-center mt-2">Malkoçoğlu</h2>
                            <p id="outro-brand-sub" class="text-slate-500 text-[8px] tracking-[0.5em] font-bold mt-2 uppercase text-center">Studio</p>
                            <div class="h-[1px] w-10 bg-slate-800 my-8"></div>
                            <p id="outro-brand-slogan" class="text-white text-[10px] opacity-50 font-light italic tracking-tight leading-relaxed text-center px-4">
                                Huzurlu Tasarım Editörü</p>
                        </div>
                    </div>
                </div>

                <!-- Kullanıcı Bilgisi -->
                <div class="absolute bottom-10 left-6 z-40 flex items-center gap-3 w-[80%]">
                    <div id="user-circle-logo" class="w-8 h-8 rounded-full bg-white flex items-center justify-center font-black text-black text-[10px] overflow-hidden bg-cover bg-center shrink-0 shadow-sm">
                        <span id="user-circle-letter">M</span>
                    </div>
                    <div class="text-white shrink truncate">
                        <p id="user-circle-name" class="text-[10px] font-bold tracking-tight shadow-sm truncate">malkocoglu_studio</p>
                        <p class="text-[8px] opacity-70 flex items-center gap-1 truncate">🌙 <span id="playing-music-name">Henüz Seçilmedi</span></p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <audio id="bg-audio" loop preload="auto"></audio>

    <script>
        const apiKey = "";
        let uploadedImages = [];
        let isPlaying = false;
        let currentSceneIndex = 0;
        let playInterval;
        let sceneTimeout;
        let startTime;

        const SCENE_DURATION = 5.0;
        const OUTRO_DURATION = 4.0;

        // --- Sidebar & UI İşlemleri ---
        let sidebarOpen = false;
        
        // Masaüstünde varsayılan olarak açık gelsin
        if(window.innerWidth >= 1024) { toggleSidebar(); }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            const bars = document.getElementById('toggle-icon-bars');
            const close = document.getElementById('toggle-icon-close');
            
            sidebarOpen = !sidebarOpen;
            
            if (sidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                bars.classList.add('hidden');
                close.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
                close.classList.add('hidden');
                bars.classList.remove('hidden');
            }
            // Sidebar animasyonu bittikten sonra ekranı ölçeklendir
            setTimeout(resizeMockup, 300);
        }

        // Mockup Boyutlandırma (Responsive)
        function resizeMockup() {
            const wrapper = document.getElementById('mockup-wrapper');
            if(!wrapper) return;
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            
            // Güvenli alanlar (Margins)
            let maxMockupW = winW - 20;
            let maxMockupH = winH - 60; // üst buton alanı ve alt boşluk için
            
            if (winW >= 1024 && sidebarOpen) {
                maxMockupW = winW - 380 - 40; // Sidebar (380px) açıldığında kalan alan
            }
            
            // "Mükemmel oran" 310x620 (Phone Mockups Standard)
            const scaleW = maxMockupW / 330; 
            const scaleH = maxMockupH / 650;
            
            // Minimum 0.7, Maksimum 1.25 olsun ki uç noktalara gitmesin, eğer sığmıyorsa kendi hesaplasın
            let scale = Math.min(1.2, Math.min(scaleW, scaleH));
            // Çok küçük telefonlarda taşmaması için koruma:
            if(scale < 0.3) scale = 0.3;
            
            wrapper.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', resizeMockup);
        resizeMockup(); setTimeout(resizeMockup, 100);

        // --- Audio & Akış Verisi ---
        const smartMatchCatalog = {
            bathroom: { initial: "Banyonuzda Modern Klasik", sub: "Estetiğin Islak Alanlardaki İmzası", options: ["Banyoda Siyahın Zarafeti", "Minimalist ve Ferah Alanlar", "Modern Estetik Gücü"] },
            vestiyer: { initial: "Kusursuz Bir Karşılama", sub: "Fonksiyonel ve Şık Vestiyerler", options: ["Giriş Alanında Düzen", "Evinizin İlk İzlenimi", "Zarif Depolama"] },
            cafe: { initial: "Germia Coffee: Mekan Ruhu", sub: "Ticari Tasarımda Mimari Ustalık", options: ["Mekana Estetik Dokunuş", "İşlevsel Mimari", "Tasarımla Gelen Keyif"] },
            default: { initial: "Malkoçoğlu Tasarım", sub: "Yaşam Alanına Değer Katın", options: ["Modern Dokunuşlar", "Estetik ve Fonksiyon", "Rafine Detaylar"] }
        };

        window.setMusicPrompt = (prompt, btn) => {
            document.querySelectorAll('.music-chip').forEach(c => c.classList.remove('active', 'bg-black', 'text-white'));
            document.querySelectorAll('.music-chip').forEach(c => c.classList.add('text-slate-500'));
            btn.classList.add('active', 'bg-black', 'text-white');
            btn.classList.remove('text-slate-500');
        };

        async function generateAiMusic() {
            const label = document.getElementById('playing-music-name');
            const btn = document.getElementById('generate-music-btn');
            btn.innerText = "YÜKLENİYOR..."; btn.disabled = true;

            try {
                const activeChip = document.querySelector('.music-chip.active');
                const isPiano = activeChip && activeChip.innerText.includes('Piyano');
                const url = isPiano ? "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" : "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3";

                const audio = document.getElementById('bg-audio');
                audio.src = url;
                audio.load();
                label.innerText = isPiano ? "Sakin Piyano" : "Huzurlu Zen";
                btn.innerText = "✓ HAZIR";
                setTimeout(() => { btn.innerText = "AI MÜZİĞİ YÜKLE"; btn.disabled = false; }, 1500);
            } catch (e) {
                btn.innerText = "AI MÜZİĞİ YÜKLE"; btn.disabled = false;
            }
        }

        document.getElementById('generate-music-btn').addEventListener('click', generateAiMusic);

        const handleFiles = (files) => {
            if (isPlaying) stopPlayback();
            Array.from(files).forEach((file) => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        let type = 'default';
                        const name = file.name.toLowerCase();
                        if (name.includes('9543') || name.includes('bath')) type = 'bathroom';
                        else if (name.includes('9288') || name.includes('vesti')) type = 'vestiyer';
                        else if (name.includes('4014') || name.includes('coffee')) type = 'cafe';

                        const data = smartMatchCatalog[type];
                        uploadedImages.push({
                            url: e.target.result,
                            title: data.initial,
                            sub: data.sub,
                            options: data.options
                        });
                        renderApp();
                        
                        // Mobilde yükleme yapılınca sidebar'ı küçült ki sonucu görsün
                        if(window.innerWidth < 1024 && sidebarOpen) {
                             setTimeout(toggleSidebar, 400);
                        }
                    };
                    reader.readAsDataURL(file);
                }
            });
        };

        function renderApp() {
            const steps = document.getElementById('steps-container');
            const scenes = document.getElementById('scenes-container');
            const progress = document.getElementById('progress-container');
            const playBtn = document.getElementById('play-btn');

            steps.innerHTML = '';
            const outro = document.getElementById('scene-outro');
            scenes.innerHTML = '';
            scenes.appendChild(outro);
            progress.innerHTML = '';

            if (uploadedImages.length === 0) {
                playBtn.disabled = true;
                steps.innerHTML = '<div class="text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest py-8">Henüz Sahne Yok</div>';
                document.getElementById('total-time-display').innerText = "0.0s";
                return;
            }

            playBtn.disabled = false;
            const totalTime = (uploadedImages.length * SCENE_DURATION) + OUTRO_DURATION;
            document.getElementById('total-time-display').innerText = totalTime.toFixed(1) + "s";

            uploadedImages.forEach((img, idx) => {
                // Timeline Step Widget
                const step = document.createElement('div');
                step.className = `p-3 rounded-2xl bg-white border border-slate-100 shadow-sm flex items-center justify-between gap-3 group/item`;
                step.id = `step-${idx}`;
                
                step.innerHTML = `
                    <div class="flex items-center gap-3 w-full overflow-hidden">
                        <img src="${img.url}" class="w-10 h-10 rounded-xl object-cover shrink-0">
                        <div class="flex flex-col truncate flex-1 leading-tight">
                            <input type="text" id="input-${idx}" value="${img.title}" oninput="updateText(${idx}, this.value)" class="text-[10px] font-bold tracking-tight bg-transparent focus:outline-none w-full truncate">
                            <span class="text-[8px] text-slate-400 font-mono mt-0.5">${SCENE_DURATION}s</span>
                        </div>
                    </div>
                    <button onclick="uploadedImages.splice(${idx},1);renderApp();" class="text-slate-300 hover:text-red-500 w-6 h-6 flex items-center justify-center rounded-lg bg-slate-50 hover:bg-red-50 transition-colors shrink-0">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                steps.appendChild(step);

                // Sahne Oluştur
                const scene = document.createElement('div');
                scene.id = `scene-${idx}`;
                scene.className = `scene`;
                scene.innerHTML = `
                    <div class="image-bg-blur" style="background-image: url('${img.url}')"></div>
                    <div class="vignette"></div>
                    <div class="image-container zoom-animation" style="background-image: url('${img.url}');"></div>
                    <div class="text-overlay">
                        <div class="text-title">${img.title}</div>
                        <div class="text-subtitle">${img.sub}</div>
                    </div>
                `;
                scenes.insertBefore(scene, outro);

                // İlerleme Çubuğu
                const seg = document.createElement('div');
                seg.className = 'progress-segment';
                seg.innerHTML = `<div id="fill-${idx}" class="progress-fill"></div>`;
                progress.appendChild(seg);
            });

            const outroSeg = document.createElement('div');
            outroSeg.className = 'progress-segment';
            outroSeg.innerHTML = `<div id="fill-outro" class="progress-fill"></div>`;
            progress.appendChild(outroSeg);

            document.querySelectorAll('.scene').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
            const firstScene = document.getElementById('scene-0');
            if (firstScene) { firstScene.classList.add('active'); firstScene.style.display = 'flex'; }
        }

        window.updateText = (idx, val) => {
            if (!uploadedImages[idx]) return;
            uploadedImages[idx].title = val;
            const input = document.getElementById(`input-${idx}`);
            if (input) input.value = val;
            const titleEl = document.querySelector(`#scene-${idx} .text-title`);
            if (titleEl) titleEl.innerText = val;
        };

        function startPlayback() {
            if (isPlaying || uploadedImages.length === 0) return;
            isPlaying = true; currentSceneIndex = 0;
            
            const pbtn = document.getElementById('play-btn');
            pbtn.classList.add('bg-black'); pbtn.classList.remove('bg-blue-600');
            document.getElementById('btn-icon').innerText = "⏹";
            document.getElementById('btn-text').innerText = "DURDUR";

            // Mobilde izlemeyi başlattığında sidebar'ı kapat ki telefon ekranı görünsün
            if(window.innerWidth < 1024 && sidebarOpen) {
                toggleSidebar();
            }

            const audio = document.getElementById('bg-audio');
            if (audio.src) { audio.currentTime = 0; audio.play().catch(e => { }); }

            startTime = Date.now();
            runProgress();
            updatePlayback();
        }

        function stopPlayback() {
            isPlaying = false;
            clearTimeout(sceneTimeout); clearInterval(playInterval);
            
            const pbtn = document.getElementById('play-btn');
            pbtn.classList.remove('bg-black'); pbtn.classList.add('bg-blue-600');
            document.getElementById('btn-icon').innerText = "▶";
            document.getElementById('btn-text').innerText = "ÖNİZLEMEYİ BAŞLAT";

            const audio = document.getElementById('bg-audio');
            audio.pause();

            document.querySelectorAll('.scene').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
            document.querySelectorAll('.progress-fill').forEach(f => f.style.width = '0%');
            document.querySelectorAll('[id^="step-"]').forEach(s => s.classList.remove('ring-2', 'ring-blue-500', 'shadow-md'));

            const first = document.getElementById('scene-0');
            if (first) { first.classList.add('active'); first.style.display = 'flex'; }
        }

        function updatePlayback() {
            if (!isPlaying) return;

            document.querySelectorAll('.scene').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
            document.querySelectorAll('[id^="step-"]').forEach(s => s.classList.remove('ring-2', 'ring-blue-500', 'shadow-md'));

            if (currentSceneIndex < uploadedImages.length) {
                const s = document.getElementById(`scene-${currentSceneIndex}`);
                if (s) { s.classList.add('active'); s.style.display = 'flex'; }

                const st = document.getElementById(`step-${currentSceneIndex}`);
                if (st) {
                    st.classList.add('ring-2', 'ring-blue-500', 'shadow-md');
                    st.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }

                sceneTimeout = setTimeout(() => {
                    currentSceneIndex++;
                    updatePlayback();
                }, SCENE_DURATION * 1000);
            } else {
                const outro = document.getElementById('scene-outro');
                if (outro) { outro.classList.add('active'); outro.style.display = 'flex'; }
                sceneTimeout = setTimeout(() => stopPlayback(), OUTRO_DURATION * 1000);
            }
        }

        function runProgress() {
            playInterval = setInterval(() => {
                if (!isPlaying) return;
                const elapsed = (Date.now() - startTime) / 1000;
                let acc = 0;
                uploadedImages.forEach((img, idx) => {
                    const fill = document.getElementById(`fill-${idx}`);
                    if (!fill) return;
                    const end = acc + SCENE_DURATION;
                    if (elapsed > end) fill.style.width = '100%';
                    else if (elapsed > acc) fill.style.width = ((elapsed - acc) / SCENE_DURATION) * 100 + '%';
                    else fill.style.width = '0%';
                    acc = end;
                });
                const outroFill = document.getElementById('fill-outro');
                if (outroFill) {
                    const start = acc, end = acc + OUTRO_DURATION;
                    if (elapsed > end) outroFill.style.width = '100%';
                    else if (elapsed > start) outroFill.style.width = ((elapsed - start) / OUTRO_DURATION) * 100 + '%';
                    else outroFill.style.width = '0%';
                }
            }, 16);
        }

        // Event Listeners
        document.getElementById('play-btn').addEventListener('click', () => isPlaying ? stopPlayback() : startPlayback());
        document.getElementById('drop-zone').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => handleFiles(e.target.files));
        document.getElementById('clear-btn').addEventListener('click', () => { uploadedImages = []; renderApp(); stopPlayback(); });

        window.changeLogo = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const logoUrl = e.target.result;
                    document.getElementById('default-logo-svg').style.display = 'none';
                    document.getElementById('main-logo-container').style.backgroundImage = `url('${logoUrl}')`;
                    
                    const outroLogoBox = document.getElementById('outro-logo-box');
                    if(outroLogoBox) {
                        const letter = document.getElementById('outro-logo-letter');
                        if (letter) letter.style.display = 'none';
                        outroLogoBox.style.backgroundImage = `url('${logoUrl}')`;
                        outroLogoBox.style.backgroundSize = 'contain';
                        outroLogoBox.style.backgroundPosition = 'center';
                        outroLogoBox.style.backgroundRepeat = 'no-repeat';
                    }

                    const userCircle = document.getElementById('user-circle-logo');
                    if (userCircle) {
                        const letter = document.getElementById('user-circle-letter');
                        if (letter) letter.style.display = 'none';
                        userCircle.style.backgroundImage = `url('${logoUrl}')`;
                    }
                };
                reader.readAsDataURL(file);
            }
        };

        window.updateBrand = (val) => {
            const name = val || 'Malkoçoğlu';
            const outroTitle = document.getElementById('outro-brand-title');
            if (outroTitle) outroTitle.innerText = name;
            
            const firstLetter = name.trim() ? name.trim().charAt(0).toUpperCase() : 'M';
            const outroLetter = document.getElementById('outro-logo-letter');
            if(outroLetter) outroLetter.innerText = firstLetter;
            const userLetter = document.getElementById('user-circle-letter');
            if(userLetter) userLetter.innerText = firstLetter;
            
            updateUsernameText();
        };

        window.updateStudioText = (val) => {
            const outroSub = document.getElementById('outro-brand-sub');
            if (outroSub) outroSub.innerText = val || 'Studio';
            updateUsernameText();
        };

        window.updateUsernameText = () => {
            const brandEl = document.getElementById('brand-name-edit');
            const subEl = document.getElementById('brand-sub-edit');
            if(brandEl && subEl) {
                const brand = brandEl.innerText.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                const sub = subEl.innerText.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                const finalName = brand + (sub ? '_' + sub : '');
                const usernameEl = document.getElementById('user-circle-name');
                if(usernameEl) usernameEl.innerText = finalName;
            }
        };

        window.updateSlogan = (val) => {
            const outroSlogan = document.getElementById('outro-brand-slogan');
            if (outroSlogan) outroSlogan.innerText = val || "Huzurlu Tasarım Editörü";
        };

    </script>
</body>
</html>
